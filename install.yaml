name: ddev-claude-code

ddev_version_constraint: '>= v1.24.10'

dependencies:
  - trebormc/ddev-ai-ssh
  - trebormc/ddev-playwright-mcp
  - trebormc/ddev-beads
  - trebormc/ddev-agents-sync

pre_install_actions:
  - |
    #ddev-description:Checking prerequisites for Claude Code
    echo "Installing ddev-claude-code add-on..."
  - |
    #ddev-description:Creating shared Claude Code config directory
    CLAUDE_CONFIG_DIR="${HOME}/.ddev/claude-code"
    if [ ! -d "$CLAUDE_CONFIG_DIR" ]; then
      mkdir -p "$CLAUDE_CONFIG_DIR"
      echo "Created shared config directory: $CLAUDE_CONFIG_DIR"
    fi

project_files:
  - docker-compose.claude-code.yaml
  - claude-code-build/Dockerfile.claude-code
  - claude-code-build/entrypoint.sh
  - claude-code-build/claude-usage-wrapper.sh
  - claude-code-build/ssh-config
  - claude-code-build/settings.default.json
  - commands/host/claude-code
  - commands/host/cc
  - .env.multica.example

global_files: []

post_install_actions:
  - |
    #ddev-description:Configuring Claude Code environment
    if [ ! -f .env.claude-code ]; then
      cat > .env.claude-code << 'ENVEOF'
    # Claude Code environment configuration

    # Shared config directory for Claude Code credentials and settings.
    # This directory is shared across ALL DDEV projects so you only
    # need to authenticate once. Change only if you need a custom location.
    HOST_CLAUDE_CONFIG_DIR=${HOME}/.ddev/claude-code

    # Timezone
    TZ=UTC
    ENVEOF
      echo "Created .env.claude-code — review auth options in .ddev/.env.claude-code"
    else
      echo ".env.claude-code already exists, skipping"
    fi
  - |
    #ddev-description:Validating Claude Code config directory
    # Source the env file to get HOST_CLAUDE_CONFIG_DIR
    if [ -f .env.claude-code ]; then
      eval "$(grep '^[[:space:]]*HOST_CLAUDE_CONFIG_DIR=' .env.claude-code)"
    fi
    CLAUDE_DIR="${HOST_CLAUDE_CONFIG_DIR:-${HOME}/.ddev/claude-code}"
    if [ ! -d "$CLAUDE_DIR" ]; then
      mkdir -p "$CLAUDE_DIR"
      echo "Created config directory: $CLAUDE_DIR"
    fi
    # Create .claude.json (user state: onboarding, theme, account) if missing.
    # First install: empty file triggers the onboarding wizard.
    # Subsequent projects: file already exists, wizard is skipped.
    CLAUDE_JSON="$CLAUDE_DIR/.claude.json"
    if [ ! -f "$CLAUDE_JSON" ]; then
      echo '{}' > "$CLAUDE_JSON"
      echo "Created .claude.json — first launch will run the onboarding wizard"
    fi
    # Create empty .credentials.json if missing.
    # Docker requires the file to exist before mounting, otherwise it creates a directory.
    # The onboarding wizard will populate it with OAuth tokens on first login.
    CREDENTIALS_FILE="$CLAUDE_DIR/.credentials.json"
    if [ ! -f "$CREDENTIALS_FILE" ]; then
      echo '{}' > "$CREDENTIALS_FILE"
      echo "Created .credentials.json — will be populated on first login"
    fi
    # NOTE: settings.json is NOT seeded here. The entrypoint builds the
    # container-global ~/.claude/settings.json by DEEP-MERGING a cascade
    # (higher levels win key by key):
    #   1. project .claude/settings.json     — merged on top natively by Claude Code
    #   2. $CLAUDE_DIR/settings.json         — user's config shared across all DDEV projects (optional)
    #   3. baked into the image              — basic defaults (bypassPermissions + notification hooks)
    # MCP servers are NOT configured in settings — they go in .mcp.json per
    # project, generated (merged) by the entrypoint on each container start.
    echo ""
    echo "Authentication: run 'ddev claude-code' and follow the prompts."
    echo ""
  - |
    #ddev-description:Preparing Multica integration (optional, shared across AI addons)
    # Multica config lives in ~/.ddev/multica/ — a neutral directory shared
    # by every Multica-aware DDEV addon (this one, ddev-opencode, etc.) so
    # one configuration enables the daemon in all of them.
    MULTICA_DIR="${HOME}/.ddev/multica"
    mkdir -p "$MULTICA_DIR"
    # Always refresh the template (this is just the example, never user data).
    if [ -f .env.multica.example ]; then
      cp .env.multica.example "$MULTICA_DIR/.env.multica.example"
    fi
    # Create empty .env.multica only if missing. Docker needs the file to
    # exist before mounting; otherwise it would create a directory.
    # Don't overwrite — another Multica-aware addon may have created it first
    # and the user may have already added their token.
    MULTICA_ENV="$MULTICA_DIR/.env.multica"
    if [ ! -f "$MULTICA_ENV" ]; then
      : > "$MULTICA_ENV"
    fi
    # Detect per-project override (.ddev/.env.multica) — takes precedence over global.
    PROJECT_MULTICA_ENV=".env.multica"
    if [ -s "$PROJECT_MULTICA_ENV" ] && grep -q '^[[:space:]]*MULTICA_TOKEN=[^[:space:]]\+' "$PROJECT_MULTICA_ENV" 2>/dev/null; then
      echo "Multica: per-project token detected in .ddev/.env.multica — daemon will use project config."
    elif grep -q '^[[:space:]]*MULTICA_TOKEN=[^[:space:]]\+' "$MULTICA_ENV" 2>/dev/null; then
      echo "Multica: global token detected in $MULTICA_ENV — daemon will start on next ddev restart."
    else
      echo "Multica: no MULTICA_TOKEN configured — daemon disabled."
      echo "         Global  : cp $MULTICA_DIR/.env.multica.example $MULTICA_ENV  (shared by all projects)"
      echo "         Per-proj: cp .ddev/.env.multica.example .ddev/.env.multica   (this project only, overrides global)"
    fi

removal_actions:
  - |
    #ddev-description:Cleaning up Claude Code
    echo "Claude Code add-on removed."
