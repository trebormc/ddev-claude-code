#ddev-generated
# Claude Code AI container for DDEV
# Provides Anthropic's Claude Code CLI with access to web container
# Install: ddev add-on get trebormc/ddev-claude-code

services:
  claude-code:
    container_name: ddev-${DDEV_SITENAME}-claude-code
    hostname: claude-code
    build:
      context: .
      dockerfile: claude-code-build/Dockerfile.claude-code
    labels:
      com.ddev.site-name: ${DDEV_SITENAME}
      com.ddev.approot: ${DDEV_APPROOT}
    restart: "no"
    user: "${DDEV_UID:-1000}:${DDEV_GID:-1000}"
    working_dir: /var/www/html

    depends_on:
      web:
        condition: service_started
      playwright-mcp:
        condition: service_started
      beads:
        condition: service_started
      agents-sync:
        condition: service_healthy

    volumes:
      - ../:/var/www/html
      # Agents, skills, rules — mounted directly from agents-sync volume
      - type: volume
        source: agents-claude-data
        target: /var/www/html/.claude/agents
        volume:
          subpath: agents
        read_only: true
      - type: volume
        source: agents-claude-data
        target: /var/www/html/.claude/skills
        volume:
          subpath: skills
        read_only: true
      - type: volume
        source: agents-claude-data
        target: /var/www/html/.claude/rules
        volume:
          subpath: rules
        read_only: true
      # CLAUDE.md from agents-sync (default project instructions)
      - type: volume
        source: agents-claude-data
        target: /var/www/html/CLAUDE.md
        volume:
          subpath: CLAUDE.md
        read_only: true
      # Project-level settings.json from agents-sync (permissions, hooks)
      - type: volume
        source: agents-claude-data
        target: /var/www/html/.claude/settings.json
        volume:
          subpath: .claude/settings.json
        read_only: true
      # Shared config — only credentials and settings (read-write)
      - ${HOST_CLAUDE_CONFIG_DIR}/settings.json:/home/claude/.claude/settings.json
      - ${HOST_CLAUDE_CONFIG_DIR}/.credentials.json:/home/claude/.claude/.credentials.json
      # Shared user state — onboarding, theme, account (read-write)
      - ${HOST_CLAUDE_CONFIG_DIR}/.claude.json:/home/claude/.claude.json
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ddev-global-cache:/mnt/ddev-global-cache

    environment:
      - DDEV_SITENAME
      - DDEV_PRIMARY_URL
      - DDEV_DOCROOT
      - IS_DDEV_PROJECT=true
      - WEB_CONTAINER=ddev-${DDEV_SITENAME}-web
      - DB_CONTAINER=ddev-${DDEV_SITENAME}-db
      - PLAYWRIGHT_MCP_URL=http://playwright-mcp:8931/mcp
      - BEADS_CONTAINER=ddev-${DDEV_SITENAME}-beads
      - TZ=${TZ:-UTC}
      - VIRTUAL_HOST=${DDEV_HOSTNAME}

    command: ["sleep", "infinity"]
    stdin_open: true
    tty: true

    extra_hosts:
      - "host.docker.internal:host-gateway"

    networks:
      - default
      - ddev_default

networks:
  ddev_default:
    name: ddev_default
    external: true

volumes:
  agents-claude-data:
    name: ddev-${DDEV_SITENAME}-agents-claude
  ddev-global-cache:
    external: true
