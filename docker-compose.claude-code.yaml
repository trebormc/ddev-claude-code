#ddev-generated
# Claude Code AI container for DDEV
# Provides Anthropic's Claude Code CLI with access to web container
# Install: ddev add-on get trebormc/ddev-claude-code

services:
  claude-code:
    container_name: ddev-${DDEV_SITENAME}-claude-code
    hostname: claude-code
    build:
      context: .
      dockerfile: claude-code-build/Dockerfile.claude-code
      args:
        USER_UID: ${DDEV_UID:-1000}
        USER_GID: ${DDEV_GID:-1000}
    labels:
      com.ddev.site-name: ${DDEV_SITENAME}
      com.ddev.approot: ${DDEV_APPROOT}
    restart: "no"
    user: "${DDEV_UID:-1000}:${DDEV_GID:-1000}"
    working_dir: /var/www/html

    depends_on:
      web:
        condition: service_started
      playwright-mcp:
        condition: service_started
      beads:
        condition: service_started
      agents-sync:
        condition: service_healthy

    volumes:
      - ../:/var/www/html
      # Agents, skills, rules from agents-sync volume, mounted at USER level
      # (~/.claude/) — global config inside the container. The project's own
      # .claude/ directory is left untouched so each project can ship its own
      # project-specific agents/skills/rules/CLAUDE.md (project level has
      # higher priority and loads IN ADDITION to user level).
      - type: volume
        source: agents-claude-data
        target: /home/claude/.claude/agents
        volume:
          subpath: agents
        read_only: true
      - type: volume
        source: agents-claude-data
        target: /home/claude/.claude/skills
        volume:
          subpath: skills
        read_only: true
      - type: volume
        source: agents-claude-data
        target: /home/claude/.claude/rules
        volume:
          subpath: rules
        read_only: true
      # Full agents volume (for CLAUDE.md copy in entrypoint)
      - agents-claude-data:/agents-data:ro
      # Host shared config dir (read-only side mount). The entrypoint builds
      # the container-global ~/.claude/settings.json by DEEP-MERGING this
      # cascade (higher wins):
      #   1. project .claude/settings.json               — merged on top natively by Claude Code
      #   2. /host-claude-config/settings.json           — user's config shared across all DDEV projects
      #   3. /agents-data/settings.generated.json        — from agents-sync: git-policy hook + default model (CC_MODEL_MAIN)
      #   4. /opt/claude-defaults/settings.json          — basic defaults baked into the image
      # A /host-claude-config/CLAUDE.md, if present, overrides the synced orchestrator.
      - ${HOST_CLAUDE_CONFIG_DIR}:/host-claude-config:ro
      # Shared credentials and state (read-write so logins persist on the host)
      - ${HOST_CLAUDE_CONFIG_DIR}/.credentials.json:/home/claude/.claude/.credentials.json
      # Shared user state — onboarding, theme, account (read-write)
      - ${HOST_CLAUDE_CONFIG_DIR}/.claude.json:/home/claude/.claude.json
      # Multica daemon: env file from the shared ~/.ddev/multica/ directory.
      # Same file is mounted by every Multica-aware DDEV addon.
      # Empty MULTICA_TOKEN means disabled — entrypoint checks before acting.
      - ${HOME}/.ddev/multica/.env.multica:/home/claude/.env.multica:ro
      - ${HOME}/.ddev/multica/.env.multica.example:/home/claude/.env.multica.example:ro
      - ddev-global-cache:/mnt/ddev-global-cache

    environment:
      - HOME=/home/claude
      - DDEV_SITENAME
      - DDEV_PRIMARY_URL
      - DDEV_HTTP_URL=http://${DDEV_SITENAME}.ddev.site
      - DDEV_DOCROOT
      - IS_DDEV_PROJECT=true
      - WEB_CONTAINER=ddev-${DDEV_SITENAME}-web
      - DB_CONTAINER=ddev-${DDEV_SITENAME}-db
      - PLAYWRIGHT_MCP_URL=http://playwright-mcp:8931/mcp
      - BEADS_CONTAINER=ddev-${DDEV_SITENAME}-beads
      - TZ=${TZ:-UTC}
      - VIRTUAL_HOST=${DDEV_HOSTNAME}

    command: ["sleep", "infinity"]
    stdin_open: true
    tty: true

    extra_hosts:
      - "host.docker.internal:host-gateway"

    networks:
      - default
      - ddev_default

networks:
  ddev_default:
    name: ddev_default
    external: true

volumes:
  agents-claude-data:
    name: ddev-${DDEV_SITENAME}-agents-claude
  ddev-global-cache:
    external: true
